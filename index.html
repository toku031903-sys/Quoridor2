<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--s2:#16213e;--red:#e94560;--green:#2ecc71;--text:#eaeaea;--dim:#777;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
#lobby{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;gap:14px;padding:24px;width:100%;max-width:400px}
.logo{font-size:2.6rem;font-weight:900;letter-spacing:-2px;text-align:center}
.logo em{color:var(--red);font-style:normal}
.logo-sub{font-size:.72rem;color:var(--dim);letter-spacing:4px;text-transform:uppercase;text-align:center;margin-top:2px}
.card{background:var(--surface);border-radius:16px;padding:18px;width:100%;display:flex;flex-direction:column;gap:10px}
.lbl{font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
input,select{background:var(--bg);border:1.5px solid #333;border-radius:10px;color:var(--text);font-size:1rem;padding:12px 14px;width:100%;outline:none;transition:border-color .2s;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--red)}
.btn{background:var(--red);color:#fff;border:none;border-radius:10px;padding:14px;font-size:.95rem;font-weight:700;cursor:pointer;width:100%;transition:opacity .12s,transform .1s;display:block;text-align:center}
.btn:active{opacity:.75;transform:scale(.97)}
.btn.sec{background:var(--s2);border:1.5px solid #444;color:var(--text)}
.btn.go{background:var(--green);color:#111}
.btn[disabled]{opacity:.4;pointer-events:none}
.divider{display:flex;align-items:center;gap:10px;color:var(--dim);font-size:.78rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#333}
#room-code{font-size:2.2rem;font-weight:900;letter-spacing:8px;text-align:center;color:var(--red);padding:10px;background:var(--bg);border-radius:8px;cursor:pointer}
#player-list{display:flex;flex-direction:column;gap:6px}
.pbadge{display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:8px;padding:9px 12px;font-size:.88rem}
.pdot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
#err-msg{color:var(--red);font-size:.82rem;text-align:center;min-height:16px}
#game{display:none;flex-direction:column;align-items:center;width:100%;min-height:100dvh;padding:8px 6px 24px;gap:6px}
#top-bar{width:100%;max-width:520px;display:flex;align-items:stretch;gap:8px}
#turn-box{flex:1;background:var(--surface);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:9px;min-width:0;overflow:hidden}
#turn-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;transition:background .3s}
#turn-name{font-weight:800;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#turn-sub{font-size:.66rem;color:var(--dim);margin-top:1px}
#timer-box{background:var(--surface);border-radius:10px;padding:8px 14px;font-size:1.25rem;font-weight:900;min-width:54px;text-align:center;font-variant-numeric:tabular-nums;display:flex;align-items:center;justify-content:center;transition:color .3s}
#timer-box.hot{color:var(--red);animation:pulse .85s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
#players-bar{width:100%;max-width:520px;display:grid;gap:5px}
.pcard{background:var(--surface);border-radius:10px;padding:7px 10px;display:flex;align-items:center;gap:7px;position:relative;overflow:hidden;transition:box-shadow .25s}
.pcard.active{box-shadow:0 0 0 2px var(--pc,#fff)}
.pcard.active::after{content:'';position:absolute;inset:0;background:var(--pc,#fff);opacity:.08;pointer-events:none}
.pcard.out{opacity:.28}
.pc-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.pc-name{font-weight:700;font-size:.8rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pc-walls{display:flex;gap:2px;flex-wrap:wrap;margin-top:2px}
.pip{width:8px;height:8px;border-radius:2px}
.pip.gone{opacity:.12}
.pc-rank{font-size:.75rem;color:var(--green);font-weight:700;flex-shrink:0}
#mode-bar{width:100%;max-width:520px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mbtn{background:var(--surface);border:2px solid transparent;border-radius:10px;color:var(--dim);padding:10px;font-size:.85rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;-webkit-appearance:none}
.mbtn.on{border-color:var(--red);color:var(--text);background:var(--s2)}
.mbtn[disabled]{opacity:.28;pointer-events:none}
#wall-hint{width:100%;max-width:520px;text-align:center;font-size:.76rem;color:var(--dim);min-height:17px}
#board-wrap{touch-action:none;flex-shrink:0}
canvas{display:block;border-radius:12px;touch-action:none}
#wconfirm{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--s2);border:1.5px solid #555;border-radius:16px;padding:16px 18px;z-index:100;width:calc(100% - 28px);max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.75)}
#wconfirm p{font-size:.88rem;margin-bottom:12px;text-align:center}
#wconfirm .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
#result{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:18px;padding:24px}
#result.show{display:flex}
#result-title{font-size:1.8rem;font-weight:900;text-align:center}
.rlist{display:flex;flex-direction:column;gap:8px;width:100%;max-width:300px}
.ritem{display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:10px;padding:12px 16px}
.rnum{font-size:1.2rem;font-weight:900;width:36px}
#toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:#222;border:1px solid #444;border-radius:10px;padding:9px 18px;font-size:.82rem;z-index:500;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:88vw;text-align:center}
#toast.show{opacity:1}
</style>

<body>

<div id="lobby">
  <div>
    <div class="logo">コリ<em>ドール</em></div>

    <div class="card">

    <div id="err-msg"></div>

      <div class="lbl">参加者</div>

      <div class="lbl">最大人数</div>

</div>

<div id="game">
  <div id="top-bar">
    <div id="turn-box">
      <div id="turn-dot"></div>
      <div style="min-width:0">
        <div id="turn-name">---</div>
        <div id="turn-sub" style="font-size:.66rem;color:var(--dim);margin-top:1px">のターン</div>
      </div>

  </div>
  <div id="players-bar"></div>
  <div id="mode-bar">
    <button class="mbtn on" id="btn-move">🚶 移動</button>

</div>

<div id="wconfirm">

  <div class="row">

</div>

<div id="result">

</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyDuSTxcieRgvZFFa4-orr7kKG7WkZ9Z_UU",
  authDomain:"quoridor2.firebaseapp.com",
  databaseURL:"https://quoridor2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"quoridor2",
  storageBucket:"quoridor2.firebasestorage.app",
  messagingSenderId:"852523004353",
  appId:"1:852523004353:web:e8a2ffe69c44d988e2ff40"
});
const db = firebase.database();

// ── 定数 ──
const COLORS = ['#e94560','#3d9aed','#f5a623','#2ecc71'];
const MEDALS = ['🥇','🥈','🥉','4位'];
const WALL_N = {2:10,3:6,4:5};
const STARTS = {
  2:[{r:8,c:4},{r:0,c:4}],
  3:[{r:8,c:4},{r:0,c:2},{r:0,c:6}],
  4:[{r:8,c:4},{r:0,c:4},{r:4,c:0},{r:4,c:8}]
};
const GOALS = {
  2:[{type:'row',val:0},{type:'row',val:8}],
  3:[{type:'row',val:0},{type:'row',val:8},{type:'row',val:8}],
  4:[{type:'row',val:0},{type:'row',val:8},{type:'col',val:8},{type:'col',val:0}]
};

// ── 状態 ──
const myId = 'p_'+Math.random().toString(36).slice(2,9);
let roomId=null, isHost=false;
let roomRef=null, roomCb=null; // roomCb: off()するためのコールバック参照を保持
let gs=null, gameStarted=false;
let mode='move', pendingWall=null, hoverWall=null;
let timerTick=null;

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
let CELL=44,GAP=6,WT=6,BS=440,OFS=7;

// ── utils ──
let _tt=null;
function toast(msg,ms=2500){
  const el=document.getElementById('toast');
  clearTimeout(_tt); el.textContent=msg; el.classList.add('show');
  _tt=setTimeout(()=>el.classList.remove('show'),ms);
}
function showErr(msg){document.getElementById('err-msg').textContent=msg;}
function uid4(){return Math.random().toString(36).slice(2,6).toUpperCase();}
function clone(o){return JSON.parse(JSON.stringify(o));}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fixGs(g){
  if(!g) return g;
  g.hWalls=Array.isArray(g.hWalls)?g.hWalls:[];
  g.vWalls=Array.isArray(g.vWalls)?g.vWalls:[];
  g.finOrder=Array.isArray(g.finOrder)?g.finOrder:[];
  return g;
}

// ── 部屋作成 ──
function createRoom(){
  showErr('');
  const nick=document.getElementById('nick').value.trim();
  if(!nick){showErr('ニックネームを入力してください');return;}
  const btn=document.getElementById('btn-create');
  btn.disabled=true; btn.textContent='作成中…';
  roomId=uid4(); isHost=true;
  roomRef=db.ref('rooms/'+roomId);
  roomRef.set({
    host:myId, status:'waiting', playerCount:2,
    players:{[myId]:{name:nick, joinedAt:Date.now()}}
  }).then(()=>{
    openWait();
    startRoomListen();
  }).catch(e=>{
    showErr('エラー: '+e.message);
    btn.disabled=false; btn.textContent='🎮 新しい部屋を作る';
  });
}

// ── 部屋参加 ──
function joinRoom(){
  showErr('');
  const nick=document.getElementById('nick').value.trim();
  const code=document.getElementById('join-code').value.trim().toUpperCase();
  if(!nick){showErr('ニックネームを入力してください');return;}
  if(code.length!==4){showErr('4文字のコードを入力してください');return;}
  const btn=document.getElementById('btn-join');
  btn.disabled=true; btn.textContent='接続中…';
  roomId=code; isHost=false;
  roomRef=db.ref('rooms/'+roomId);

  // ★ async/await で書き直し（thenチェーンのreturn漏れバグを排除）
  async function doJoin(){
    const snap=await roomRef.once('value');
    if(!snap.exists()){showErr('部屋が見つかりません');btn.disabled=false;btn.textContent='参加する →';return;}
    const d=snap.val();
    if(d.status!=='waiting'){showErr('すでにゲームが開始されています');btn.disabled=false;btn.textContent='参加する →';return;}
    const cnt=Object.keys(d.players||{}).length;
    if(cnt>=(d.playerCount||2)){showErr('満員です');btn.disabled=false;btn.textContent='参加する →';return;}
    await db.ref('rooms/'+roomId+'/players/'+myId).update({name:nick, joinedAt:Date.now()});
    openWait();
    startRoomListen();
  }
  doJoin().catch(e=>{
    showErr('エラー: '+e.message);
    btn.disabled=false; btn.textContent='参加する →';
  });
}

function openWait(){
  document.getElementById('view-main').style.display='none';
  document.getElementById('view-wait').style.display='flex';
  document.getElementById('room-code').textContent=roomId;
  if(isHost) document.getElementById('host-settings').style.display='block';
}

function leaveRoom(){
  stopRoomListen();
  if(roomRef) db.ref('rooms/'+roomId+'/players/'+myId).remove();
  location.reload();
}

function updatePCount(){
  if(!isHost||!roomRef) return;
  roomRef.update({playerCount:parseInt(document.getElementById('pcount-sel').value)});
}

// ── Room listener（コールバック参照を保持してoff()できるように）──
function startRoomListen(){
  stopRoomListen();
  roomCb = roomRef.on('value', function onRoomValue(snap){
    if(!snap.exists()) return;
    const d=snap.val();
    if(d.status==='waiting'){
      renderWaiting(d);
    } else if(d.status==='playing' && d.game){
      // ★ まずリスナーを止めてからゲームへ
      stopRoomListen();
      launchGame(fixGs(clone(d.game)));
      startGameListen();
    }
  });
}

function stopRoomListen(){
  if(roomRef && roomCb){
    roomRef.off('value', roomCb);
    roomCb=null;
  }
}

function renderWaiting(d){
  const ps=Object.entries(d.players||{}).sort((a,b)=>a[1].joinedAt-b[1].joinedAt);
  const need=d.playerCount||2;
  document.getElementById('player-list').innerHTML=ps.map(([pid,p],i)=>
    `<div class="pbadge"><div class="pdot" style="background:${COLORS[i%4]}"></div>
    <span>${esc(p.name)}${pid===myId?' (あなた)':''}</span></div>`).join('');
  document.getElementById('lobby-st').textContent=`${ps.length} / ${need} 人参加中`;
  if(isHost){
    document.getElementById('pcount-sel').value=need;
    const can=ps.length>=2;
    const sb=document.getElementById('start-btn');
    sb.style.display=can?'block':'none';
    if(can) sb.textContent=`${ps.length}人でゲーム開始 🚀`;
  }
}

// ── Game listener ──
function startGameListen(){
  db.ref('rooms/'+roomId+'/game').on('value',snap=>{
    if(!snap.exists()) return;
    const newGs=fixGs(clone(snap.val()));
    gs=newGs;
    if(gameStarted) updateGameUI();
  });
}

// ── ゲーム開始（ホストのみ）──
function startGame(){
  if(!isHost) return;
  const btn=document.getElementById('start-btn');
  btn.disabled=true; btn.textContent='開始中…';

  async function doStart(){
    const snap=await roomRef.once('value');
    const d=snap.val();
    const ps=Object.entries(d.players||{}).sort((a,b)=>a[1].joinedAt-b[1].joinedAt);
    const n=Math.min(ps.length,4);
    if(n<2){
      toast('最低2人必要です');
      btn.disabled=false; btn.textContent='ゲーム開始 🚀';
      return;
    }
    const shuffled=[...ps.slice(0,n)].sort(()=>Math.random()-.5);
    const wallC=WALL_N[n]||5;
    const players={};
    shuffled.forEach(([pid,p],i)=>{
      players[pid]={
        name:p.name, ci:i,
        pos:{r:STARTS[n][i].r, c:STARTS[n][i].c},
        walls:wallC,
        goal:{type:GOALS[n][i].type, val:GOALS[n][i].val},
        rank:0, out:false
      };
    });
    const game={
      players,
      order:shuffled.map(([pid])=>pid),
      ti:0,
      hWalls:null, vWalls:null,
      status:'playing',
      firstDone:false,
      timerStart:0,
      finOrder:null
    };
    await roomRef.update({status:'playing', game});
  }

  doStart().catch(e=>{
    toast('エラー: '+e.message);
    btn.disabled=false; btn.textContent='ゲーム開始 🚀';
  });
}

// ── ゲーム起動 ──
function launchGame(newGs){
  gs=newGs;
  if(!gameStarted){
    gameStarted=true;
    document.getElementById('lobby').style.display='none';
    document.getElementById('game').style.display='flex';
    initCanvas();
    requestAnimationFrame(animLoop);
  }
  updateGameUI();
}

// ── Canvas ──
function initCanvas(){
  const vw=Math.min(window.innerWidth-12,500);
  CELL=Math.floor((vw-16)/10.5);
  GAP=Math.max(5,Math.floor(CELL*0.13));
  WT=Math.max(4,GAP-1);
  BS=CELL*9+GAP*8+WT*2+4;
  OFS=WT+2;
  canvas.width=BS; canvas.height=BS;
  canvas.style.width=BS+'px'; canvas.style.height=BS+'px';
  canvas.addEventListener('click',onCvClick);
  canvas.addEventListener('touchend',onCvTouch,{passive:false});
  canvas.addEventListener('touchmove',onCvTouchMove,{passive:false});
  canvas.addEventListener('mousemove',onCvMouseMove);
}
function cellXY(r,c){return{x:OFS+c*(CELL+GAP),y:OFS+r*(CELL+GAP)};}
function pixToCell(px,py){
  const step=CELL+GAP;
  const ci=Math.floor((px-OFS)/step),ri=Math.floor((py-OFS)/step);
  if(ri<0||ri>=9||ci<0||ci>=9) return null;
  if((px-OFS)-ci*step>=CELL||(py-OFS)-ri*step>=CELL) return null;
  return{r:ri,c:ci};
}
function pixToWall(px,py){
  const step=CELL+GAP;
  for(let r=0;r<8;r++){
    const wy=OFS+r*step+CELL;
    if(py<wy-5||py>wy+WT+5) continue;
    for(let c=0;c<8;c++){
      const wx=OFS+c*step;
      if(px>=wx-2&&px<=wx+CELL*2+GAP+2) return{r,c,dir:'h'};
    }
  }
  for(let c=0;c<8;c++){
    const wx=OFS+c*step+CELL;
    if(px<wx-5||px>wx+WT+5) continue;
    for(let r=0;r<8;r++){
      const wy=OFS+r*step;
      if(py>=wy-2&&py<=wy+CELL*2+GAP+2) return{r,c,dir:'v'};
    }
  }
  return null;
}
function getXY(e,isTouch){
  const rect=canvas.getBoundingClientRect(),sc=canvas.width/rect.width;
  const s=isTouch?e.changedTouches[0]:e;
  return{px:(s.clientX-rect.left)*sc,py:(s.clientY-rect.top)*sc};
}
function onCvClick(e){const{px,py}=getXY(e,false);interact(px,py);}
function onCvTouch(e){e.preventDefault();const{px,py}=getXY(e,true);interact(px,py);}
function onCvTouchMove(e){
  e.preventDefault(); if(!gs||mode!=='wall') return;
  const{px,py}=getXY(e,true); hoverWall=pendingWall||pixToWall(px,py);
}
function onCvMouseMove(e){
  if(!gs||mode!=='wall') return;
  const{px,py}=getXY(e,false); hoverWall=pendingWall||pixToWall(px,py);
}
function interact(px,py){
  if(!gs||gs.status!=='playing') return;
  if(gs.order[gs.ti]!==myId){toast('あなたのターンではありません');return;}
  const me=gs.players[myId]; if(!me||me.out) return;
  if(mode==='move'){
    const cell=pixToCell(px,py); if(!cell) return;
    const mvs=validMoves(gs,myId);
    if(!mvs.some(m=>m.r===cell.r&&m.c===cell.c)){toast('そこには移動できません');return;}
    doMove(cell);
  } else {
    if(me.walls<=0){toast('壁が残っていません');return;}
    const w=pixToWall(px,py); if(!w) return;
    if(!canPlace(gs,w)){toast('ここには壁を置けません');return;}
    pendingWall=w; hoverWall=w;
    document.getElementById('wconfirm').style.display='block';
    document.getElementById('wall-hint').textContent=(w.dir==='h'?'横':'縦')+'壁プレビュー中';
  }
}

// ── 壁判定 ──
function hasH(g,r,c){return g.hWalls.some(w=>w.r===r&&w.c===c);}
function hasV(g,r,c){return g.vWalls.some(w=>w.r===r&&w.c===c);}
function isBlocked(g,r1,c1,r2,c2){
  if(r2===r1+1) return hasH(g,r1,c1)||hasH(g,r1,c1-1);
  if(r2===r1-1) return hasH(g,r1-1,c1)||hasH(g,r1-1,c1-1);
  if(c2===c1+1) return hasV(g,r1,c1)||hasV(g,r1-1,c1);
  if(c2===c1-1) return hasV(g,r1,c1-1)||hasV(g,r1-1,c1-1);
  return false;
}
function validMoves(g,pid){
  const p=g.players[pid]; if(!p||p.out) return[];
  const{r,c}=p.pos,D=[[-1,0],[1,0],[0,-1],[0,1]];
  const others=Object.entries(g.players).filter(([id,pp])=>id!==pid&&!pp.out).map(([,pp])=>pp.pos);
  const seen=new Set(),res=[];
  function add(r,c){const k=r+','+c;if(!seen.has(k)){seen.add(k);res.push({r,c});}}
  for(const[dr,dc]of D){
    const nr=r+dr,nc=c+dc;
    if(nr<0||nr>=9||nc<0||nc>=9||isBlocked(g,r,c,nr,nc)) continue;
    if(!others.find(o=>o.r===nr&&o.c===nc)){add(nr,nc);}
    else{
      const jr=nr+dr,jc=nc+dc;
      if(jr>=0&&jr<9&&jc>=0&&jc<9&&!isBlocked(g,nr,nc,jr,jc)&&!others.find(o=>o.r===jr&&o.c===jc)){
        add(jr,jc);
      } else {
        for(const[dr2,dc2]of D){
          if(dr2===dr&&dc2===dc||dr2===-dr&&dc2===-dc) continue;
          const sr=nr+dr2,sc=nc+dc2;
          if(sr>=0&&sr<9&&sc>=0&&sc<9&&!isBlocked(g,nr,nc,sr,sc)&&!others.find(o=>o.r===sr&&o.c===sc)) add(sr,sc);
        }
      }
    }
  }
  return res;
}
function hasPath(g,pid){
  const p=g.players[pid]; if(!p) return false;
  const{type,val}=p.goal;
  const vis=new Set(),q=[[p.pos.r,p.pos.c]];
  vis.add(p.pos.r+','+p.pos.c);
  while(q.length){
    const[r,c]=q.shift();
    if(type==='row'&&r===val||type==='col'&&c===val) return true;
    for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){
      const nr=r+dr,nc=c+dc,k=nr+','+nc;
      if(nr>=0&&nr<9&&nc>=0&&nc<9&&!vis.has(k)&&!isBlocked(g,r,c,nr,nc)){vis.add(k);q.push([nr,nc]);}
    }
  }
  return false;
}
function canPlace(g,wall){
  if(wall.dir==='h'){
    if(hasH(g,wall.r,wall.c)||hasH(g,wall.r,wall.c+1)||hasH(g,wall.r,wall.c-1)) return false;
    if(hasV(g,wall.r,wall.c+1)) return false;
  } else {
    if(hasV(g,wall.r,wall.c)||hasV(g,wall.r+1,wall.c)||hasV(g,wall.r-1,wall.c)) return false;
    if(hasH(g,wall.r+1,wall.c)) return false;
  }
  const sim={...g,
    hWalls:wall.dir==='h'?[...g.hWalls,{r:wall.r,c:wall.c,dir:'h'}]:g.hWalls,
    vWalls:wall.dir==='v'?[...g.vWalls,{r:wall.r,c:wall.c,dir:'v'}]:g.vWalls
  };
  for(const[pid,p]of Object.entries(g.players)){
    if(p.out||p.rank>0) continue;
    if(!hasPath(sim,pid)) return false;
  }
  return true;
}

// ── アクション ──
function doMove(pos){
  if(!gs) return;
  const g=fixGs(clone(gs));
  const p=g.players[myId]; p.pos={r:pos.r,c:pos.c};
  const{type,val}=p.goal;
  if(type==='row'&&pos.r===val||type==='col'&&pos.c===val){
    p.rank=g.finOrder.length+1; p.out=true; g.finOrder.push(myId);
  }
  advanceTurn(g);
  pushGame(g);
}
function cancelWall(){
  pendingWall=null; hoverWall=null;
  document.getElementById('wconfirm').style.display='none';
  document.getElementById('wall-hint').textContent='壁を置きたい場所をタップ';
}
function confirmWall(){
  if(!pendingWall) return;
  const g=fixGs(clone(gs));
  if(pendingWall.dir==='h') g.hWalls.push({r:pendingWall.r,c:pendingWall.c,dir:'h'});
  else                       g.vWalls.push({r:pendingWall.r,c:pendingWall.c,dir:'v'});
  g.players[myId].walls--;
  document.getElementById('wconfirm').style.display='none';
  document.getElementById('wall-hint').textContent='';
  pendingWall=null; hoverWall=null;
  advanceTurn(g);
  pushGame(g);
}
function advanceTurn(g){
  g.firstDone=true; g.timerStart=Date.now();
  const alive=g.order.filter(pid=>!g.players[pid]?.out);
  if(alive.length<=1){
    if(alive.length===1){
      const pid=alive[0];
      g.players[pid].rank=g.finOrder.length+1;
      g.players[pid].out=true;
      g.finOrder.push(pid);
    }
    g.status='finished'; return;
  }
  let ni=(g.ti+1)%g.order.length;
  for(let i=0;i<g.order.length;i++){
    if(!g.players[g.order[ni]]?.out) break;
    ni=(ni+1)%g.order.length;
  }
  g.ti=ni;
}
function pushGame(g){
  const d=clone(g);
  if(!d.hWalls||!d.hWalls.length) d.hWalls=null;
  if(!d.vWalls||!d.vWalls.length) d.vWalls=null;
  if(!d.finOrder||!d.finOrder.length) d.finOrder=null;
  db.ref('rooms/'+roomId+'/game').set(d).catch(e=>{
    toast('送信エラー: '+e.message); console.error(e);
  });
}

// ── タイマー ──
function resetTimer(){
  clearInterval(timerTick);
  const box=document.getElementById('timer-box');
  if(!gs||!gs.firstDone||!gs.timerStart){box.textContent='30';box.classList.remove('hot');return;}
  const activePid=gs.order[gs.ti];
  const ts=gs.timerStart;
  const tick=()=>{
    if(!gs||gs.timerStart!==ts){clearInterval(timerTick);return;}
    const left=Math.max(0,Math.ceil(30-(Date.now()-ts)/1000));
    box.textContent=left; box.classList.toggle('hot',left<=10);
    if(left<=0&&activePid===myId){
      clearInterval(timerTick);
      const mv=validMoves(gs,myId);
      if(mv.length) doMove(mv[Math.floor(Math.random()*mv.length)]);
    }
  };
  tick(); timerTick=setInterval(tick,300);
}

// ── UI更新 ──
function updateGameUI(){
  if(!gs) return;
  if(gs.status==='finished'){showResult();return;}
  const activePid=gs.order[gs.ti],ap=gs.players[activePid],isMe=activePid===myId;
  document.getElementById('turn-dot').style.background=ap?COLORS[ap.ci]:'#888';
  document.getElementById('turn-name').textContent=isMe?'あなたのターン！':esc(ap?.name||'')+'さん';
  document.getElementById('turn-sub').textContent=isMe?'行動してください':'のターン';
  document.getElementById('btn-move').disabled=!isMe;
  document.getElementById('btn-wall').disabled=!isMe||(gs.players[myId]?.walls<=0);
  const n=gs.order.length,wMax=WALL_N[n]||5;
  const pb=document.getElementById('players-bar');
  pb.style.gridTemplateColumns=n===2?'1fr 1fr':n===3?'1fr 1fr 1fr':'1fr 1fr 1fr 1fr';
  pb.innerHTML=gs.order.map(pid=>{
    const p=gs.players[pid],col=COLORS[p.ci];
    const pips=Array.from({length:wMax},(_,i)=>`<div class="pip${i>=p.walls?' gone':''}" style="background:${col}"></div>`).join('');
    return`<div class="pcard${pid===activePid?' active':''}${p.out?' out':''}" style="--pc:${col}">
      <div class="pc-dot" style="background:${col}"></div>
      <div style="flex:1;min-width:0">
        <div class="pc-name">${esc(p.name)}${pid===myId?'<span style="font-size:.6rem;opacity:.4;margin-left:3px">me</span>':''}</div>
        <div class="pc-walls">${pips}</div>
      </div>
      ${p.rank?`<div class="pc-rank">${MEDALS[p.rank-1]||p.rank+'位'}</div>`:''}
    </div>`;
  }).join('');
  if(!isMe){setMode('move');cancelWall();}
  resetTimer();
}
function setMode(m){
  mode=m; pendingWall=null; hoverWall=null;
  document.getElementById('wconfirm').style.display='none';
  document.getElementById('wall-hint').textContent=m==='wall'?'壁を置きたい場所をタップ':'';
  document.getElementById('btn-move').classList.toggle('on',m==='move');
  document.getElementById('btn-wall').classList.toggle('on',m==='wall');
}
function showResult(){
  clearInterval(timerTick);
  document.getElementById('result').classList.add('show');
  const sorted=Object.entries(gs.players).sort((a,b)=>(a[1].rank||99)-(b[1].rank||99));
  document.getElementById('rank-list').innerHTML=sorted.map(([pid,p])=>
    `<div class="ritem"><div class="rnum">${MEDALS[(p.rank||4)-1]}</div>
    <div class="pdot" style="background:${COLORS[p.ci]};width:13px;height:13px;border-radius:50%"></div>
    <div>${esc(p.name)}${pid===myId?'<span style="font-size:.75rem;opacity:.5"> (あなた)</span>':''}</div></div>`).join('');
}

// ── 描画 ──
function animLoop(){
  requestAnimationFrame(animLoop);
  if(!gs||!gameStarted) return;
  draw();
}
function draw(){
  ctx.clearRect(0,0,BS,BS);
  ctx.fillStyle='#1a1a2e'; ctx.beginPath(); ctx.roundRect(0,0,BS,BS,10); ctx.fill();
  const activePid=gs.order[gs.ti],isMe=activePid===myId;
  const mvs=isMe&&mode==='move'?validMoves(gs,myId):[];
  const blink=0.45+0.5*Math.abs(Math.sin(Date.now()/360));
  for(let r=0;r<9;r++){
    for(let c=0;c<9;c++){
      const{x,y}=cellXY(r,c),isMv=mvs.some(m=>m.r===r&&m.c===c);
      ctx.fillStyle=isMv?`rgba(255,255,255,${0.06+0.04*blink})`:'#0c0e1d';
      ctx.beginPath(); ctx.roundRect(x,y,CELL,CELL,3); ctx.fill();
      if(isMv){ctx.fillStyle=`rgba(255,255,255,${blink*0.65})`;ctx.beginPath();ctx.arc(x+CELL/2,y+CELL/2,CELL*0.17,0,Math.PI*2);ctx.fill();}
    }
  }
  ctx.setLineDash([5,4]); ctx.lineWidth=2.5;
  for(const pid of gs.order){
    const p=gs.players[pid]; if(p.out) continue;
    const col=COLORS[p.ci]; ctx.strokeStyle=col+'55';
    const{type,val}=p.goal;
    ctx.beginPath();
    if(type==='row'){const gy=val===0?OFS-3:OFS+val*(CELL+GAP)+CELL+3;ctx.moveTo(OFS,gy);ctx.lineTo(OFS+CELL*9+GAP*8,gy);}
    else{const gx=val===0?OFS-3:OFS+val*(CELL+GAP)+CELL+3;ctx.moveTo(gx,OFS);ctx.lineTo(gx,OFS+CELL*9+GAP*8);}
    ctx.stroke();
  }
  ctx.setLineDash([]);
  if(mode==='wall'&&hoverWall&&isMe) drawWall(hoverWall,'rgba(255,200,50,0.4)');
  for(const w of gs.hWalls) drawWall(w,'#c09a44');
  for(const w of gs.vWalls) drawWall(w,'#c09a44');
  for(const pid of gs.order){
    const p=gs.players[pid]; if(p.out) continue;
    const{r,c}=p.pos,{x,y}=cellXY(r,c),col=COLORS[p.ci],isActive=pid===activePid;
    if(isActive){ctx.shadowColor=col;ctx.shadowBlur=18;}
    ctx.fillStyle=col; ctx.beginPath(); ctx.arc(x+CELL/2,y+CELL/2,CELL*0.37,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=isActive?2.5:1.5; ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font=`bold ${Math.floor(CELL*.3)}px system-ui`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.name[0].toUpperCase(),x+CELL/2,y+CELL/2);
  }
}
function drawWall(w,color){
  const{x,y}=cellXY(w.r,w.c); ctx.fillStyle=color; ctx.beginPath();
  if(w.dir==='h') ctx.roundRect(x,y+CELL+Math.floor(GAP*0.08),CELL*2+GAP,WT,2);
  else            ctx.roundRect(x+CELL+Math.floor(GAP*0.08),y,WT,CELL*2+GAP,2);
  ctx.fill();
}

// ── ボタンバインド（最後に実行）──
document.getElementById('btn-create').onclick     = createRoom;
document.getElementById('btn-join').onclick       = joinRoom;
document.getElementById('btn-leave').onclick      = leaveRoom;
document.getElementById('start-btn').onclick      = startGame;
document.getElementById('pcount-sel').onchange    = updatePCount;
document.getElementById('btn-move').onclick       = function(){setMode('move');};
document.getElementById('btn-wall').onclick       = function(){setMode('wall');};
document.getElementById('btn-cancel-wall').onclick= cancelWall;
document.getElementById('btn-ok-wall').onclick    = confirmWall;
document.getElementById('btn-back').onclick       = function(){location.reload();};
document.getElementById('room-code').onclick      = function(){
  if(roomId && navigator.clipboard) navigator.clipboard.writeText(roomId).then(()=>toast('コピーしました！'));
};
</script>
